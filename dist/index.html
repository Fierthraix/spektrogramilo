<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Spektrogramilo - Realtempaj Sonoj</title>
    <style>
        body {
            background: #1a1a1a;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .visualization-container {
            width: 100%;
            max-width: 800px;
        }
        .time-series, .spectrogram, .waterfall {
            margin: 20px 0;
            position: relative;
        }
        .axis-label {
            position: absolute;
            color: #888;
            font-size: 12px;
        }
        .x-axis {
            bottom: -25px;
            right: 10px;
        }
        .y-axis {
            transform: rotate(-90deg);
            transform-origin: left top;
            left: -30px;
            top: 50%;
        }
        canvas {
            border: 1px solid #333;
            margin: 10px;
            background: #000;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 10px;
        }
        button:hover {
            background: #45a049;
        }
        button:disabled {
            background: #6f6f6f;
            cursor: progress;
        }
        .status {
            width: 100%;
            max-width: 800px;
            margin: 0 0 20px;
            padding: 12px 16px;
            border: 1px solid #2f2f2f;
            border-radius: 8px;
            background: #111;
            color: #cfcfcf;
            line-height: 1.5;
        }
        .status[data-tone="active"] {
            border-color: #2a7d46;
            color: #dff5e7;
        }
        .status[data-tone="error"] {
            border-color: #9c3b3b;
            color: #ffd4d4;
        }
    </style>
</head>
<body>
    <h1>Spektrogramilo</h1>
    <button id="startBtn">Komenci Sonogramon</button>
    <p id="status" class="status" data-tone="idle">
        Alklaku la butonon kaj permesu mikrofonan aliron por vidi la sonondojn.
    </p>
    
    <div class="visualization-container">
        <div class="time-series">
            <h2>Tempa Serio</h2>
            <canvas id="timeCanvas" width="800" height="200"></canvas>
        </div>

        <div class="spectrogram">
            <h2>Spektrogramo</h2>
            <canvas id="freqCanvas" width="800" height="400"></canvas>
        </div>

        <div class="waterfall">
            <h2>Akvofalgrafo</h2>
            <canvas id="waterfallCanvas" width="800" height="400"></canvas>
            <div class="axis-label x-axis">Tempo →</div>
            <div class="axis-label y-axis">Frekvenco →</div>
        </div>
    </div>

    <script type="module">
        import init, { Spectrogram } from './pkg/spektrogramilo.js';

        async function run() {
            await init();
            
            const startBtn = document.getElementById('startBtn');
            const statusEl = document.getElementById('status');
            const waterfallCanvas = document.getElementById('waterfallCanvas');
            let spectrogram = null;
            let animationId = null;
            let isStarting = false;

            function setStatus(message, tone = 'idle') {
                statusEl.textContent = message;
                statusEl.dataset.tone = tone;
            }

            function describeStartError(error) {
                const message = error && typeof error.message === 'string'
                    ? error.message
                    : String(error);
                const lowerMessage = message.toLowerCase();

                if (lowerMessage.includes('notallowederror') || lowerMessage.includes('permission denied')) {
                    return 'Mikrofona permeso estis rifuzita. Permesu la mikrofonon en la retumilo kaj reprovu.';
                }

                if (lowerMessage.includes('notfounderror') || lowerMessage.includes('requested device not found')) {
                    return 'Neniu mikrofono estis trovita. Konektu mikrofonon kaj reprovu.';
                }

                if (lowerMessage.includes('notreadableerror') || lowerMessage.includes('could not start audio source')) {
                    return 'La mikrofono ne povis ekfunkcii. Kontrolu ĉu alia programo jam uzas ĝin.';
                }

                if (lowerMessage.includes('securityerror')) {
                    return 'La retumilo blokis mikrofonan aliron pro sekureca politiko.';
                }

                return `Ne eblis startigi la spektrogramon: ${message}`;
            }

            function stopAnimation(statusMessage = 'Spektrogramo haltis. Alklaku la butonon por restartigi kaj reprovi la mikrofonon.', statusTone = 'idle') {
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
                spectrogram = null;
                isStarting = false;
                startBtn.disabled = false;
                startBtn.textContent = 'Komenci Sonogramon';
                setStatus(statusMessage, statusTone);
            }
            
            // Handle mouse movement over the piano roll
            function setupPianoRollInteraction(waterfall) {
                const pianoRollWidth = 40; // Must match piano_roll_width in Rust
                
                // Track if currently highlighting a frequency
                let isHighlighting = false;
                
                // Function to clear highlight
                function clearHighlight() {
                    if (spectrogram && isHighlighting) {
                        spectrogram.set_highlighted_frequency(-1);
                        isHighlighting = false;
                    }
                }
                
                // Update highlighting based on mouse position
                function updateHighlight(x, y) {
                    if (!spectrogram) return;
                    
                    // Check if mouse is over the piano roll area
                    if (x <= pianoRollWidth) {
                        spectrogram.set_highlighted_frequency(y);
                        isHighlighting = true;
                    } else {
                        clearHighlight();
                    }
                }
                
                // Add mouse movement listener
                waterfall.addEventListener('mousemove', (event) => {
                    const rect = waterfall.getBoundingClientRect();
                    const x = event.clientX - rect.left;
                    const y = event.clientY - rect.top;
                    updateHighlight(x, y);
                });
                
                // Clear highlight when mouse leaves canvas
                waterfall.addEventListener('mouseleave', clearHighlight);
                
                // Also listen for mouseout to ensure we catch all cases
                waterfall.addEventListener('mouseout', clearHighlight);
                
                // Clear when animation stops
                startBtn.addEventListener('click', () => {
                    if (spectrogram === null) {
                        clearHighlight();
                    }
                });
            }

            setupPianoRollInteraction(waterfallCanvas);
            
            startBtn.addEventListener('click', async () => {
                if (isStarting) {
                    return;
                }

                if (!spectrogram) {
                    try {
                        isStarting = true;
                        startBtn.disabled = true;
                        setStatus('Petante mikrofonan permeson. Se la retumilo demandas, elektu “Allow” aŭ “Permesi”.');
                        spectrogram = new Spectrogram('timeCanvas', 'freqCanvas', 'waterfallCanvas');
                        await spectrogram.start();

                        const animate = () => {
                            try {
                                spectrogram.draw_frame();
                                animationId = requestAnimationFrame(animate);
                            } catch (error) {
                                console.error('Error in animation frame:', error);
                                stopAnimation();
                            }
                        };

                        animate();
                        isStarting = false;
                        startBtn.disabled = false;
                        startBtn.textContent = 'Haltu Sonogramon';
                        setStatus('Mikrofono aktivas. Parolu aŭ faru bruon por vidi la spektrogramon moviĝi.', 'active');
                    } catch (error) {
                        console.error('Error starting spectrogram:', error);
                        stopAnimation(describeStartError(error), 'error');
                    }
                } else {
                    stopAnimation();
                }
            });
        }

        run().catch(console.error);
    </script>
</body>
</html>
